
services:
  web:
    build: ./backend
    env_file:
     - ./backend/.env
    #container_name: loan_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
    - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
  react:
    build: ./frontend
    command: npm start
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    stdin_open: true
    tty: true

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: lending_db
      POSTGRES_USER: lending_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7

  celery:
    build: ./backend
    command: celery -A config.celery worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/static
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: