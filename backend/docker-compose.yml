version: "3.9"

services:
  web:
    build: .
    container_name: loan_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis


  db:
    image: postgres:15
    environment:
      POSTGRES_DB: lending_db
      POSTGRES_USER: lending_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7

  celery:
    build: .
    command: celery -A config.celery worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/static
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: